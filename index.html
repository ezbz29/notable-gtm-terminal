<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM TERMINAL | Notable Capital</title>
<!-- Alverata is Notable's brand font (commercial). Lora is the fallback. Swap @font-face when Alverata license is available. -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* To use actual Alverata, add @font-face here with your license files */
:root {
  --bg-primary: #05090f;
  --bg-secondary: #0a1019;
  --bg-panel: #0d1522;
  --bg-card: #111d2e;
  --bg-hover: #142438;
  --border: #1a2e48;
  --border-bright: #243d5a;
  --text-primary: #f5f5f5;
  --text-secondary: #b0bca8;
  --text-dim: #5a6e52;
  --green: #00d67e;
  --green-bright: #33f5a6;
  --red: #ff4757;
  --red-bright: #ff6b7a;
  --amber: #ffb930;
  --amber-bright: #ffd060;
  --blue: #4a90ff;
  --cyan: #96a88d;
  --notable-primary: #96a88d;
  --notable-primary-bright: #adbfa5;
  --notable-dark: #6b7d5e;
  --notable-cream: #f5f5f5;
  --purple: #9b6dff;
  --font-brand: 'Lora', 'Alverata', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ FUNDING TICKER ═══ */
.ticker-wrap {
  width: 100%;
  overflow: hidden;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 5px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.ticker {
  display: flex;
  animation: tickerScroll 90s linear infinite;
  white-space: nowrap;
  width: fit-content;
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.3px;
}
.ticker-item .company { color: var(--text-primary); font-weight: 600; }
.ticker-item .round { color: var(--notable-primary); font-weight: 700; }
.ticker-item .detail { color: var(--text-dim); }
.ticker-item .amount { color: var(--green); font-weight: 700; }
.ticker-sep { color: var(--border-bright); padding: 0 6px; font-size: 8px; }
@keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* ═══ HEADER ═══ */
.header {
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #6b7d5e, #96a88d);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-brand);
  font-weight: 600; font-size: 20px; font-style: italic;
  color: var(--bg-primary);
}
.header-title h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: var(--text-primary);
  line-height: 1;
}
.header-title .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--notable-primary);
  letter-spacing: 1.5px; margin-top: 3px;
}
.header-right { display: flex; align-items: center; gap: 18px; }
.header-stat { text-align: right; }
.header-stat .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase;
}
.header-stat .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; color: var(--notable-primary);
}
.live-dot {
  width: 5px; height: 5px; background: var(--green); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite; display: inline-block; margin-right: 4px;
}
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,214,126,0.4)} 50%{opacity:0.6;box-shadow:0 0 0 5px rgba(0,214,126,0)} }

/* ═══ CATEGORY NAV ═══ */
.category-nav {
  display: flex; gap: 0; padding: 0 28px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; background: var(--bg-secondary);
  scrollbar-width: none;
}
.category-nav::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 9px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 500; letter-spacing: 0.5px;
  color: var(--text-dim); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; text-transform: uppercase;
}
.cat-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.02); }
.cat-tab.active {
  color: var(--notable-primary);
  border-bottom-color: var(--notable-primary);
  background: rgba(150,168,141,0.04);
}

/* ═══ MAIN LAYOUT ═══ */
.main-container { display: flex; height: calc(100vh - 136px); }
.tools-panel {
  width: 460px; min-width: 460px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--bg-primary);
}
.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-panel);
}
.panel-header h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 1px; text-transform: uppercase;
}
.panel-header .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-dim);
}
.tools-table-header {
  display: grid; grid-template-columns: 32px 1fr 60px 64px 52px;
  padding: 6px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
}
.tools-table-header span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 700; color: var(--text-dim);
  letter-spacing: 1px; text-transform: uppercase;
}
.tools-table-header span:nth-child(n+3) { text-align: right; }
.tools-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border-bright) var(--bg-primary);
}
.tool-row {
  display: grid; grid-template-columns: 32px 1fr 60px 64px 52px;
  padding: 9px 14px;
  border-bottom: 1px solid rgba(26,37,64,0.5);
  cursor: pointer; transition: all 0.12s; align-items: center;
}
.tool-row:hover { background: var(--bg-hover); }
.tool-row.active { background: rgba(150,168,141,0.06); border-left: 2px solid #96a88d; padding-left: 12px; }
.tool-rank { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; color:var(--text-dim); }
.tool-row.active .tool-rank { color: var(--notable-primary); }
.tool-info { display:flex; flex-direction:column; gap:1px; }
.tool-name { font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:600; color:var(--text-primary); }
.tool-tag { font-family:'JetBrains Mono',monospace; font-size:8.5px; color:var(--text-dim); letter-spacing:0.5px; }
.tool-tag.legacy{color:var(--red)} .tool-tag.emerging{color:var(--green)} .tool-tag.growth{color:var(--amber)} .tool-tag.leader{color:var(--cyan)} .tool-tag.ai-native{color:var(--purple)}
.tool-score { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; text-align:right; }
.tool-trend { font-family:'JetBrains Mono',monospace; font-size:10px; text-align:right; font-weight:600; }
.tool-signal { text-align:right; }
.signal-bar { display:inline-block; width:36px; height:5px; background:var(--bg-panel); border-radius:2px; overflow:hidden; }
.signal-bar-fill { height:100%; border-radius:2px; }

/* ═══ DETAIL PANEL ═══ */
.detail-panel { flex:1; overflow-y:auto; background:var(--bg-primary); scrollbar-width:thin; scrollbar-color:var(--border-bright) var(--bg-primary); }
.detail-empty { display:flex; align-items:center; justify-content:center; height:100%; flex-direction:column; gap:16px; }
.detail-empty .icon { font-size:32px; color:var(--notable-primary); opacity:0.2; }
.detail-empty p { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); letter-spacing:1.5px; }

.detail-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
}
.detail-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
.detail-title-area { display:flex; align-items:center; gap:12px; }
.detail-logo {
  width:44px; height:44px; background:var(--bg-card); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-weight:800; font-size:16px;
  color:var(--notable-primary); border:1px solid var(--border-bright);
}
.detail-title h2 { font-family:'DM Sans',sans-serif; font-size:20px; font-weight:700; }
.detail-title .tagline { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); margin-top:2px; }
.detail-score-big { text-align:right; }
.detail-score-big .number { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:800; }
.detail-score-big .label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase; }

.detail-meta { display:flex; gap:20px; flex-wrap:wrap; }
.meta-item .meta-label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
.meta-item .meta-value { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--text-secondary); margin-top:1px; }

.pros-cons { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--border); }
.pros-section { padding:18px 24px; border-right:1px solid var(--border); }
.cons-section { padding:18px 24px; }
.section-label {
  font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.section-label.bull{color:var(--green)} .section-label.bear{color:var(--red)}
.pro-item,.con-item { padding:6px 0; font-size:12.5px; color:var(--text-secondary); line-height:1.5; display:flex; gap:8px; }
.pro-item::before{content:'▲';color:var(--green);font-size:7px;margin-top:5px;flex-shrink:0}
.con-item::before{content:'▼';color:var(--red);font-size:7px;margin-top:5px;flex-shrink:0}

.integrations-section { padding:18px 24px; border-bottom:1px solid var(--border); }
.integrations-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.integration-chip {
  display:flex; align-items:center; gap:5px; padding:4px 10px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:5px;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-secondary);
  transition:all 0.12s;
}
.integration-chip:hover { border-color:var(--border-bright); background:var(--bg-hover); }
.integration-icon {
  width:14px; height:14px; border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-size:7px; font-weight:700; color:var(--bg-primary);
}

.offers-section { padding:18px 24px; border-bottom:1px solid var(--border); }
.offer-card {
  background:linear-gradient(135deg,rgba(150,168,141,0.06),rgba(150,168,141,0.02));
  border:1px solid rgba(150,168,141,0.18); border-radius:6px; padding:14px; margin-top:10px;
}
.offer-title { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:#adbfa5; margin-bottom:4px; }
.offer-details { font-size:11.5px; color:var(--text-secondary); line-height:1.5; }
.offer-value {
  display:inline-block; background:rgba(0,214,126,0.1); color:var(--green);
  padding:2px 8px; border-radius:3px; font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:700; margin-top:6px;
}

.cta-section { padding:18px 24px; }
.cta-button {
  width:100%; padding:12px 24px;
  background:linear-gradient(135deg, #96a88d, #adbfa5);
  color:#f5f5f5; font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  border:none; border-radius:6px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.cta-button:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(150,168,141,0.3); }
.cta-sub {
  text-align:center; margin-top:6px; font-family:'JetBrains Mono',monospace;
  font-size:8px; color:var(--text-dim); letter-spacing:0.5px;
}

/* Notable watermark */
.notable-watermark {
  padding: 12px 24px;
  text-align: center;
  border-top: 1px solid var(--border);
  background: rgba(150,168,141,0.03);
}
.visit-btn {
  display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
  background:var(--bg-card); border:1px solid var(--border-bright); border-radius:5px;
  color:var(--notable-primary); font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:600; letter-spacing:0.5px; cursor:pointer;
  text-decoration:none; transition:all 0.15s; margin-top:12px;
}
.visit-btn:hover { background:var(--bg-hover); border-color:var(--notable-primary); color:var(--notable-primary-bright); }
.customers-row {
  display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;
}
.customer-chip {
  padding:3px 8px; background:rgba(150,168,141,0.06); border:1px solid rgba(150,168,141,0.12);
  border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:9px;
  color:var(--text-secondary); letter-spacing:0.3px;
}
.notable-watermark span {
  font-family: var(--font-brand);
  font-style: italic;
  font-size: 13px;
  color: var(--notable-primary);
  letter-spacing: 0.5px;
}

.mini-chart { display:flex; align-items:flex-end; gap:1px; height:18px; }
.mini-bar { width:3px; border-radius:1px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.25s ease forwards; }

::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg-primary)} ::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}

@media(max-width:900px){
  .main-container{flex-direction:column;height:auto}
  .tools-panel{width:100%;min-width:100%;max-height:50vh}
  .pros-cons{grid-template-columns:1fr}
  .pros-section{border-right:none;border-bottom:1px solid var(--border)}
}

/* Scanlines */
body::after {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);
}
</style>
</head>

<!-- PASSWORD GATE -->
<div id="passwordGate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#05090f;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-family:'Lora','Alverata',Georgia,serif;font-style:italic;font-size:28px;color:#96a88d;">Notable Capital</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#5a6e52;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">GTM Terminal · Access Required</div>
  <input id="pwInput" type="password" placeholder="Enter password" style="background:#0d1522;border:1px solid #1a2e48;border-radius:6px;padding:10px 20px;color:#f5f5f5;font-family:'JetBrains Mono',monospace;font-size:13px;width:260px;text-align:center;outline:none;" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()" style="background:linear-gradient(135deg,#6b7d5e,#96a88d);color:#f5f5f5;border:none;border-radius:6px;padding:8px 32px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;">Enter</button>
  <div id="pwError" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#ff4757;display:none;">ACCESS DENIED</div>
</div>
<script>
function checkPw(){
  if(document.getElementById('pwInput').value==='Notable2026'){
    document.getElementById('passwordGate').style.display='none';
    document.getElementById('pwInput').value='';
  } else {
    const e=document.getElementById('pwError');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',2000);
  }
}
document.getElementById('pwInput').focus();
</script>

function gIC(n){return IC[n]||IC.Default}
function gI(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}

// ═══ RENDERING ═══
let currentCategory=null,currentTool=null;

function initTicker(){
  const t=document.getElementById('ticker');
  let items=[];
  // Collect all tools
  let allTools=[];
  Object.entries(CATEGORIES).forEach(([k,cat])=>cat.tools.forEach(tool=>allTools.push({...tool,cat:cat.short})));

  // Section 1: Category leaders with scores
  Object.values(CATEGORIES).forEach(cat=>{
    const l=cat.tools[0];
    const sc=l.score>=85?'var(--green)':l.score>=75?'var(--amber)':'var(--red)';
    items.push(`<span class="ticker-item"><span class="company">${l.name}</span><span class="round">${cat.short} #1</span><span class="detail" style="color:${sc}">${l.score.toFixed(1)}</span></span>`);
  });

  // Section 2: Top 10 momentum movers
  const byMomentum=[...allTools].sort((a,b)=>parseFloat(b.trend)-parseFloat(a.trend)).slice(0,10);
  byMomentum.forEach(t=>{
    items.push(`<span class="ticker-item"><span class="company">${t.name}</span><span class="round">▲ MOMENTUM</span><span class="detail" style="color:var(--green)">${t.trend}%</span></span>`);
  });

  // Section 3: Top signal strength
  const bySignal=[...allTools].sort((a,b)=>b.signal-a.signal).slice(0,6);
  bySignal.forEach(t=>{
    items.push(`<span class="ticker-item"><span class="company">${t.name}</span><span class="round">PMF</span><span class="detail">${t.signal}/100</span></span>`);
  });

  const html=items.join('<span class="ticker-sep">◆</span>');
  t.innerHTML=html+'<span class="ticker-sep">◆</span>'+html;
}

function initCategoryNav(){
  const nav=document.getElementById('categoryNav');
  Object.entries(CATEGORIES).forEach(([key,cat],i)=>{
    const tab=document.createElement('div');
    tab.className=`cat-tab${i===0?' active':''}`;
    tab.textContent=cat.short;
    tab.onclick=()=>selectCategory(key);
    nav.appendChild(tab);
  });
}

function selectCategory(key){
  currentCategory=key;currentTool=null;
  document.querySelectorAll('.cat-tab').forEach((tab,i)=>{
    tab.className=`cat-tab${Object.keys(CATEGORIES)[i]===key?' active':''}`;
  });
  const cat=CATEGORIES[key];
  document.getElementById('panelTitle').textContent=cat.name.toUpperCase();
  document.getElementById('panelCount').textContent=`${cat.tools.length} INSTRUMENTS`;
  renderToolsList(cat.tools);
  renderEmptyDetail();
}

function renderToolsList(tools){
  const list=document.getElementById('toolsList');
  list.innerHTML='';
  tools.forEach((tool,i)=>{
    const row=document.createElement('div');
    row.className='tool-row';
    row.onclick=()=>selectTool(tool,i,row);
    const tc=tool.trendDir==='up'?'var(--green)':'var(--red)';
    const ta=tool.trendDir==='up'?'▲':'▼';
    const sc=tool.score>=85?'var(--green)':tool.score>=75?'var(--amber)':'var(--red)';
    const sic=tool.signal>=80?'var(--green)':tool.signal>=60?'var(--amber)':'var(--red)';
    row.innerHTML=`
      <span class="tool-rank">${String(i+1).padStart(2,'0')}</span>
      <div class="tool-info"><span class="tool-name">${tool.name}</span><span class="tool-tag ${tool.tagClass}">${tool.tag}</span></div>
      <span class="tool-score" style="color:${sc}">${tool.score.toFixed(1)}</span>
      <span class="tool-trend" style="color:${tc}">${ta} ${tool.trend}%</span>
      <span class="tool-signal"><div class="signal-bar"><div class="signal-bar-fill" style="width:${tool.signal}%;background:${sic}"></div></div></span>`;
    list.appendChild(row);
  });
}

function selectTool(tool,index,row){
  currentTool=tool;
  document.querySelectorAll('.tool-row').forEach(r=>r.classList.remove('active'));
  row.classList.add('active');
  renderToolDetail(tool,index);
}

function renderEmptyDetail(){
  document.getElementById('detailPanel').innerHTML=`<div class="detail-empty"><div class="icon">◆</div><p>SELECT AN INSTRUMENT TO VIEW ANALYSIS</p><p style="font-size:9px;color:var(--notable-dark);margin-top:8px">POWERED BY NOTABLE CAPITAL</p></div>`;
}

function renderToolDetail(tool,index){
  const p=document.getElementById('detailPanel');
  const sc=tool.score>=85?'var(--green)':tool.score>=75?'var(--amber)':'var(--red)';
  const tc=tool.trendDir==='up'?'var(--green)':'var(--red)';
  const intHTML=tool.integrations.map(int=>{
    if(int.startsWith("Everything")) return `<div class="integration-chip" style="border-color:var(--notable-primary);color:var(--notable-primary)">⚡ ${int}</div>`;
    const c=gIC(int);
    return `<div class="integration-chip"><div class="integration-icon" style="background:${c}">${gI(int)}</div>${int}</div>`;
  }).join('');
  const bars=Array.from({length:14},()=>{const h=Math.random()*14+4;const c=Math.random()>0.3?'var(--green)':'var(--red)';return `<div class="mini-bar" style="height:${h}px;background:${c}"></div>`;}).join('');

  p.innerHTML=`
    <div class="detail-header fade-in">
      <div class="detail-top">
        <div class="detail-title-area">
          <div class="detail-logo">${gI(tool.name)}</div>
          <div class="detail-title"><h2>${tool.name}</h2><span class="tagline">${tool.tagline}</span></div>
        </div>
        <div class="detail-score-big">
          <div class="number" style="color:${sc}">${tool.score.toFixed(1)}</div>
          <div class="label">COMPOSITE SCORE</div>
          <div class="mini-chart" style="margin-top:4px;justify-content:flex-end">${bars}</div>
        </div>
      </div>
      <div class="detail-meta">
        <div class="meta-item"><div class="meta-label">RANK</div><div class="meta-value">#${index+1} IN CATEGORY</div></div>
        <div class="meta-item"><div class="meta-label">MOMENTUM</div><div class="meta-value" style="color:${tc}">${tool.trendDir==='up'?'▲':'▼'} ${tool.trend}%</div></div>
        <div class="meta-item"><div class="meta-label">CLASS</div><div class="meta-value">${tool.tag}</div></div>
        <div class="meta-item"><div class="meta-label">FOUNDED</div><div class="meta-value">${tool.founded}</div></div>
        <div class="meta-item"><div class="meta-label">STAGE</div><div class="meta-value">${tool.stage}</div></div>
        <div class="meta-item"><div class="meta-label">HQ</div><div class="meta-value">${tool.hq}</div></div>
      </div>
      <a href="${tool.url}" target="_blank" class="visit-btn">→ VISIT ${tool.name.toUpperCase().replace(/ \(.*\)/,'')}</a>
    </div>
    <div class="pros-cons fade-in" style="animation-delay:0.08s">
      <div class="pros-section">
        <div class="section-label bull">▲ BULL CASE</div>
        ${tool.pros.map(p=>`<div class="pro-item">${p}</div>`).join('')}
      </div>
      <div class="cons-section">
        <div class="section-label bear">▼ BEAR CASE</div>
        ${tool.cons.map(c=>`<div class="con-item">${c}</div>`).join('')}
      </div>
    </div>
    <div class="integrations-section fade-in" style="animation-delay:0.12s">
      <div class="section-label" style="color:var(--cyan)">⬡ NATIVE INTEGRATIONS</div>
      <div class="integrations-grid">${intHTML}</div>
    </div>
    ${tool.customers && tool.customers.length > 0 ? `
    <div class="integrations-section fade-in" style="animation-delay:0.14s;border-bottom:1px solid var(--border)">
      <div class="section-label" style="color:var(--text-secondary)">◎ REFERENCED CUSTOMERS</div>
      <div class="customers-row">${tool.customers.map(c=>`<span class="customer-chip">${c}</span>`).join('')}</div>
    </div>` : ''}
    <div class="offers-section fade-in" style="animation-delay:0.16s">
      <div class="section-label" style="color:var(--notable-primary)">★ STARTUP OFFER</div>
      <div class="offer-card">
        <div class="offer-title">${tool.offer}</div>
        <div class="offer-details">${tool.offerDetail}</div>
        <div class="offer-value">${tool.offerValue}</div>
      </div>
    </div>
    <div class="cta-section fade-in" style="animation-delay:0.2s">
      <button class="cta-button" onclick="window.open('mailto:startups@notablecap.com?subject=GTM Stack Inquiry: ${encodeURIComponent(tool.name)}&body=Hi Notable team,%0D%0A%0D%0AI found ${encodeURIComponent(tool.name)} on the GTM Terminal and would like to connect regarding our stack evaluation.%0D%0A%0D%0ACompany:%0D%0AStage:%0D%0AGTM Challenge:%0D%0A','_blank')">
        ◆ CONNECT WITH NOTABLE STARTUPS TEAM
      </button>
      <div class="cta-sub">Get personalized GTM stack recommendations from Notable Capital's portfolio team</div>
    </div>
    <div class="notable-watermark">
      <span>Notable Capital · We back founders who are notable.</span>
    </div>`;
  p.scrollTop=0;
}

// ═══ INIT ═══
function init(){
  let total=0;
  Object.values(CATEGORIES).forEach(c=>total+=c.tools.length);
  document.getElementById('totalTools').textContent=total;
  document.getElementById('totalCats').textContent=Object.keys(CATEGORIES).length;
  initTicker();
  initCategoryNav();
  selectCategory(Object.keys(CATEGORIES)[0]);
}
init();
</script>
</body>
</html>
